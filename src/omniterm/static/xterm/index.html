<!DOCTYPE html>
<html>
<head>
    <link rel="stylesheet" type="text/css" href="xterm.css">
    <script src="xterm.js"></script>
    <script src="xterm-addon-fit.js"></script>
    <script src="qrc:///qtwebchannel/qwebchannel.js"></script>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            width: 100%;
            background-color: #1e1e1e;
            overflow: hidden;
        }
        #terminal {
            height: 100%;
            width: 100%;
        }
    </style>
</head>
<body>
    <div id="terminal"></div>
    <script>
        var term = new Terminal({
            cursorBlink: true,
            theme: {
                background: '#1e1e1e',
                foreground: '#ffffff'
            }
        });
        var fitAddon = new FitAddon.FitAddon();
        term.loadAddon(fitAddon);
        term.open(document.getElementById('terminal'));
        fitAddon.fit();

        // Expose so the Python side can tweak appearance at runtime.
        window.term = term;
        window.fitAddon = fitAddon;

        // Apply terminal appearance (font size / colors). Works across
        // xterm.js 4.x (setOption) and 5.x (options.*).
        window.applyTerminalSettings = function (settings) {
            try {
                if (typeof settings.fontSize === 'number') {
                    if (term.options) { term.options.fontSize = settings.fontSize; }
                    else { term.setOption('fontSize', settings.fontSize); }
                }
                if (typeof settings.fontFamily === 'string') {
                    if (term.options) { term.options.fontFamily = settings.fontFamily; }
                    else { term.setOption('fontFamily', settings.fontFamily); }
                }
                var base = (term.options && term.options.theme) ? term.options.theme : {};
                var theme = Object.assign({}, base);
                if (settings.foreground) { theme.foreground = settings.foreground; theme.cursor = settings.foreground; }
                if (settings.background) {
                    theme.background = settings.background;
                    document.body.style.backgroundColor = settings.background;
                }
                if (term.options) { term.options.theme = theme; }
                else { term.setOption('theme', theme); }
                if (window.fitAddon) { window.fitAddon.fit(); }
            } catch (e) { /* ignore */ }
        };

        // QWebChannel setup
        new QWebChannel(qt.webChannelTransport, function (channel) {
            window.pybridge = channel.objects.pybridge;

            // Listen for data from Python
            pybridge.onDataReceived.connect(function(data) {
                term.write(data);
            });

            // Send keystrokes to Python
            term.onData(function(data) {
                pybridge.sendData(data);
            });

            // Report terminal dimensions to Python so the PTY matches the window
            // (full-screen apps like top/nvtop/vim use the real size).
            term.onResize(function(size) {
                if (pybridge.resize) {
                    pybridge.resize(size.cols, size.rows);
                }
            });

            // Fit now that the bridge is ready and report the initial size
            // explicitly (fit() alone won't fire onResize if dimensions are unchanged).
            fitAddon.fit();
            if (pybridge.resize) {
                pybridge.resize(term.cols, term.rows);
            }
        });

        window.addEventListener('resize', function() {
            fitAddon.fit();
        });
    </script>
</body>
</html>
